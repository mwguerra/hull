name: release

# Build the native host on every OS (the only reliable way to get all platforms),
# then publish each platform package + the main package. Trigger by pushing a tag
# like v1.2.3, or run manually.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-hosts:
    name: build host (${{ matrix.key }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2025,   key: win32-x64 }
          - { os: macos-14,       key: darwin-arm64 }
          - { os: ubuntu-latest,  key: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24 }

      # --- platform deps ---
      - name: Install OpenSSL (Windows / vcpkg)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          vcpkg install openssl:x64-windows
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git pkg-config \
            libssl-dev libsecret-1-dev \
            libcups2-dev libgnutls28-dev libavahi-client-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev

      - run: npm ci
      - run: npm run build:host        # native build for this runner's OS

      - uses: actions/upload-artifact@v7
        with:
          name: host-${{ matrix.key }}
          path: packages/hull-${{ matrix.key }}/bin/*
          if-no-files-found: error

  publish:
    needs: build-hosts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24, registry-url: "https://registry.npmjs.org" }
      - run: npm ci

      # Re-hydrate every platform binary built above.
      - uses: actions/download-artifact@v8
        with: { path: artifacts }
      - name: Stage binaries into platform packages
        run: |
          for key in win32-x64 darwin-arm64 linux-x64; do
            mkdir -p "packages/hull-$key/bin"
            cp -r artifacts/host-$key/* "packages/hull-$key/bin/" || true
          done

      # Pin optionalDependencies into the main package, then publish everything.
      - run: node scripts/prepare-publish.mjs "${GITHUB_REF_NAME#v}" || node scripts/prepare-publish.mjs
      - name: Publish platform packages
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: |
          for key in win32-x64 darwin-arm64 linux-x64; do
            ( cd "packages/hull-$key" && npm publish --access public ) || echo "skip hull-$key"
          done
      - name: Publish @mwguerra/hull
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
        run: cd packages/hull && npm publish --access public
